<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://libs.zappar.com/zappar-aframe/2.0.0/zappar-aframe.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* Mengunci kamera HP agar normal, pas di layar, dan tidak otomatis nge-zoom tebal */
      #zappar-webcam video {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
      }
    </style>
  </head>

  <body>
    <a-scene embedded color-management="true" vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kudaKeren" src="low_poly_horse.glb"></a-asset-item>
      </a-assets>

      <a-entity zappar-permissions-ui id="permissions"></a-entity>
      <a-camera zappar-camera="user-facing: true;" look-controls="enabled: false" fov="60"></a-camera>

      <a-entity light="type: ambient; intensity: 1.6;"></a-entity>
      <a-entity light="type: directional; intensity: 1.2; position: 1 3 2;"></a-entity>

      <a-entity zappar-face id="face-anchor">
        
        <a-entity 
          gltf-model="#kudaKeren"
          scale="0.15 0.15 0.15"
          position="0 0.6 -0.5"
          rotation="90 0 0">
        </a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
