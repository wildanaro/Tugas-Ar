<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-face-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Memaksa video kamera agar pas di layar HP dan tidak nge-zoom terdistorsi */
      .mindar-face-video-container video {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
      }
    </style>
  </head>

  <body>
    <a-scene mindar-face="autoStart: true; faceMeshDetail: full;" embedded color-management="true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kudaBaru" src="low_poly_horse.glb"></a-asset-item>
      </a-assets>

      <a-camera active="true" position="0 0 0" look-controls="enabled: false" fov="60"></a-camera>

      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0; position: 1 2 1;"></a-entity>

      <a-mindar-face-target anchorIndex="10">
        <a-entity 
          gltf-model="#kudaBaru"
          scale="0.3 0.3 0.3"
          position="0 0.5 -0.5"
          rotation="0 0 0">
        </a-entity>
      </a-mindar-face-target>

    </a-scene>
  </body>
</html>
